    type: sync
    module: src.actions.code_scan
    args: [self, event]
  add_issue_comment:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, issue_number, body]
    params:
      returns: dict
  add_labels_to_issue:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, issue_number, labels]
    params:
      returns: dict
  async_main:
    type: async
    module: src.main
  create_code_scan_agent:
    type: sync
    module: src.github_agents.code_scan_agent
    args: [model, custom_prompt]
    params:
      returns: Agent
  create_github_agent:
    type: sync
    module: src.github_agents.github_agent
    args: [model, custom_prompt]
    params:
      returns: Agent
  create_issue:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, title, body, labels]
    params:
      returns: dict
  create_issue_analyze_agent:
    type: sync
    module: src.github_agents.issue_analyze_agent
    args: [model, custom_prompt]
    params:
      returns: Agent
  create_pr_review_agent:
    type: sync
    module: src.github_agents.pr_review_agent
    args: [model, custom_prompt]
    params:
      returns: Agent[PRReviewResponse]
  create_pull_request_review:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, pr_number, body, event, review_comments]
    params:
      returns: dict
  execute_tool:
    type: async
    module: src.tools
    args: [name, parameters, context]
    params:
      returns: str
  get_github_event:
    type: sync
    module: src.main
  get_issue:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, issue_number]
    params:
      returns: dict
  get_pull_request:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, pr_number]
    params:
      returns: dict
  get_pull_request_files:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, pr_number]
    params:
      returns: list[dict]
  get_repository_file_content:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, path, ref]
    params:
      returns: dict
  get_repository_info:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo]
    params:
      returns: dict
  get_repository_stats:
