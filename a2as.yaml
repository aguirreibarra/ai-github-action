  list_issue_comments:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, issue_number]
    params:
      returns: list[dict]
  list_issue_labels:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, issue_number]
    params:
      returns: list[str]
  list_repository_files:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, path, ref]
    params:
      returns: dict
  main:
    type: sync
    module: src.main
  run:
    type: async
    module: src.actions.code_scan
    args: [self]
    params:
      returns: None
  search_code:
    type: tool
    module: src.tools.github_function_tools
    args: [context, query, repo]
    params:
      returns: list[dict]
  update_or_create_issue_comment:
    type: tool
    module: src.tools.github_function_tools
    args: [context, repo, issue_number, body, header_marker]
    params:
      returns: dict
  update_or_create_pr_comment:
    type: tool
